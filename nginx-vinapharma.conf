server {
    listen 80;
    server_name vinapharmajsc.vn www.vinapharmajsc.vn;

    # Frontend static files
    root /var/www/vinapharma/files;
    index index.html;

    # Maintenance page
    error_page 503 /bao-tri.html;

    location = /bao-tri.html {
        try_files /bao-tri.html =404;
    }

    # Maintenance mode: return maintenance page for the whole site
    location /api/ {
        return 503;
    }

    location /uploads/ {
        return 503;
    }

    location / {
        return 503;
    }

