<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Bảo trì – Vinapharma</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#fff;font-family:'Segoe UI',sans-serif;color:#1a1a1a}
    .wrap{text-align:center;padding:2rem;max-width:480px}
    .logo{display:flex;align-items:center;justify-content:center;gap:.5rem;margin-bottom:2.5rem}
    .logo img{height:40px}
    .icon{font-size:3.5rem;margin-bottom:1.2rem}
    h1{font-size:1.6rem;font-weight:700;margin-bottom:.75rem}
    p{color:#6b7280;font-size:.95rem;line-height:1.6;margin-bottom:1.5rem}
    .hotline{display:inline-flex;align-items:center;gap:.5rem;background:#fff5f5;border:1px solid #fecaca;border-radius:2rem;padding:.55rem 1.2rem;color:#cc1f1f;font-weight:600;font-size:.95rem;text-decoration:none}
    .hotline:hover{background:#fef2f2}
    .dots{display:flex;gap:.4rem;justify-content:center;margin-top:2.5rem}
    .dot{width:8px;height:8px;border-radius:50%;background:#e5e7eb;animation:pulse 1.4s infinite}
    .dot:nth-child(2){animation-delay:.2s}
    .dot:nth-child(3){animation-delay:.4s}
    @keyframes pulse{0%,100%{background:#e5e7eb}50%{background:#cc1f1f}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">
      <img src="logo-header.png" alt="Vinapharma" onerror="this.style.display='none'"/>
    </div>
    <div class="icon">🔧</div>
    <h1>Trang web đang bảo trì</h1>
    <p>Chúng tôi đang nâng cấp hệ thống để mang đến trải nghiệm tốt hơn cho bạn.<br/>Vui lòng quay lại sau ít phút.</p>
    <a class="hotline" href="tel:0901683380">📞 Hotline: 090 168 33 80</a>
    <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
  </div>
</body>
</html>
